<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contact Us</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Oleo+Script+Swash+Caps:wght@400;700&family=Oswald:wght@200..700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="home.css" />
    </head>
    <style>
        @import url('https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css');
        body {
            height: 115vh;
        }
        /* navbar start  */
        .custom-navbar {
            background-color: rgb(222, 132, 166); /* or your color */
            backdrop-filter: blur(10px);
        }

        /* LOGO SIZE */
        .logo {
            height: 50px;
            width: auto;
        }

        /* MOBILE LOGO */
        @media (max-width: 576px) {
            .logo {
                height: 40px;
            }
        }

        /* NAV LINK STYLE */
        .nav-link {
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ff6b81;
        }

        /* FIX BODY OVERLAP (important for fixed navbar) */
        body {
            padding-top: 70px;
        }
        a {
            text-decoration: none;
        }

        li {
            list-style: none;
        }

        .text-azure {
            color: azure !important;
        }
        /*  nav bar end  */
        .container {
            padding-top: 90px;
        }
        footer {
            position: fixed;
            height: 5rem;
            left: 0;
            bottom: 0;
            width: 100%;
            background-color: rgb(222, 132, 166);
            color: white;
            text-align: center;
            padding: 10px 0;
            z-index: 1000;
        }
        footer p {
            font-size: clamp(0.8rem, 2vw, 1.3rem);
        }
        .social-icon {
            display: inline-block;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .social-icon:hover {
            transform: translateY(-5px);
        }

        .bi-facebook:hover {
            color: blueviolet !important;
        }
        .bi-twitter:hover {
            color: aqua !important;
        }
        .bi-instagram:hover {
            color: rgb(255, 46, 46) !important ;
        }
    </style>
    <body>
        <!-- navbar  -->
        <nav class="navbar navbar-expand-lg navbar-dark custom-navbar fixed-top px-4">
            <div class="container-fluid">
                <a href="menu.html" class="navbar-brand fw-bold"> <img src="P_P (1).png" class="logo" alt="P_P logo" /> </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto gap-3">
                        <li class="nav-item"><a href="menu.html" class="nav-link text-azure">Menu</a></li>
                        <li class="nav-item"><a href="about-us.html" class="nav-link text-azure">About Us</a></li>
                        <li class="nav-item"><a href="contact-us.html" class="nav-link text-azure">Contact Us</a></li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="container">
            <h1 class="text-center mt-3" style="font-family: Oleo Script Swash Caps; color: rgb(205, 86, 86)">Contact Us</h1>
            <form>
                <div class="form-group">
                    <label for="fname">First Name:</label>
                    <input type="text" name="fname" class="form-control" id="fname" name="fname" placeholder="" />
                    <label for="lname">Last Name: </label>
                    <input type=" text" id="lname" class="form-control" name="lname" placeholder="" />
                </div>
                <div class="form-group">
                    <label for="phone">Phone:</label>
                    <input type="tel" name="phone" id="phone" class="form-control" />
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control my-2" id="email" />
                </div>
                <div class="form-group">
                    <label for="message">Tell Us About Your Event</label>
                    <textarea name="message" id="message" class="form-control my-2" rows="5"></textarea>
                </div>
                <div class="form-group">
                    <label for="daytime">Date of Your Event:</label>
                    <input type="datetime-local" name="daytime" id="daytime" class="form-control" />
                </div>

                <div class="d-flex justify-content-center mt-5">
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </div>
            </form>
        </div>

        <footer>
            <div class="container-fluid py-4">
                <div class="d-flex container-fluid" style="margin-left: auto; margin-right: 0 auto; justify-content: center">
                    <p style="margin-left: 31rem !important">+60123456789</p>
                    <a href="https://www.facebook.com/" target="_blank"><i class="bi bi-facebook text-white px-2"> </i></a>
                    <a href="https://x.com/" target="_blank"><i class="bi bi-twitter text-white px-2"></i></a>
                    <a href="https://www.instagram.com/" target="_blank"><i class="bi bi-instagram text-white px-2"></i></a>
                    <p style="margin-right: 30rem !important">pinkandpastry@gmail.com</p>
                </div>
            </div>
        </footer>
    </body>
</html>
